<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>TransitLK</title>
<link rel="icon" type="image/png" href="logo2.png">
<link rel="apple-touch-icon" href="logo2.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
  import { getDatabase, ref, onValue } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';
  const cfg = {
    apiKey:"AIzaSyAqoBhfXXNJYUdOD5oCq8oJWF3NJFuP8XI",
    authDomain:"transitlk-79740.firebaseapp.com", projectId:"transitlk-79740",
    storageBucket:"transitlk-79740.firebasestorage.app", messagingSenderId:"756408321316",
    appId:"1:756408321316:web:9f3b8e80a9cfe39c3bfa0b",
    databaseURL:"https://transitlk-79740-default-rtdb.firebaseio.com"
  };
  const app = initializeApp(cfg);
  const db = getDatabase(app);
  window._db=db; window._ref=ref; window._onValue=onValue;
  window.dispatchEvent(new Event('fb-ready'));
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#080808;--surface:rgba(14,14,14,0.97);--glass:rgba(18,18,18,0.92);
  --border:rgba(255,255,255,0.07);--border-light:rgba(255,255,255,0.13);
  --text:#fff;--dim:rgba(255,255,255,0.45);--muted:rgba(255,255,255,0.2);
  --cyan:#38bdf8;--green:#7ee85a;--purple:#a855f7;--orange:#f97316;
  --yellow:#eab308;--red:#ef4444;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:"Sora",sans-serif;overflow:hidden}

/* ── MAP BASE ── */
#main-map{position:fixed;inset:0;z-index:0}

/* ── TOP BAR ── */
.top-bar{
  position:fixed;top:0;left:0;right:0;z-index:100;
  padding:env(safe-area-inset-top,12px) 16px 12px;
  padding-top:max(env(safe-area-inset-top),14px);
  background:linear-gradient(to bottom,rgba(8,8,8,.92) 0%,rgba(8,8,8,0) 100%);
  pointer-events:none;
}
.top-bar-inner{pointer-events:all;display:flex;align-items:center;gap:10px}

.search-pill{
  flex:1;background:var(--glass);border:1px solid var(--border-light);
  border-radius:14px;padding:11px 14px;cursor:pointer;
  display:flex;align-items:center;gap:10px;
  box-shadow:0 4px 20px rgba(0,0,0,.5);backdrop-filter:blur(20px);
  transition:border-color .2s;
}
.search-pill:hover{border-color:rgba(56,189,248,.35)}
.search-pill-ico{color:var(--dim);flex-shrink:0}
.search-pill-text{flex:1;font-size:14px;color:var(--dim)}
.search-pill-dest{font-size:12px;color:var(--cyan);font-weight:600;flex-shrink:0;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ── BOTTOM SHEETS ── */
.sheet{
  position:fixed;left:0;right:0;bottom:0;z-index:200;
  background:var(--glass);border-radius:22px 22px 0 0;
  border:1px solid var(--border);border-bottom:none;
  backdrop-filter:blur(24px);
  transform:translateY(100%);transition:transform .38s cubic-bezier(.4,0,.2,1);
  max-height:88vh;display:flex;flex-direction:column;
  box-shadow:0 -8px 40px rgba(0,0,0,.7);
}
.sheet.open{transform:translateY(0)}
.sheet-handle{width:40px;height:4px;border-radius:2px;background:rgba(255,255,255,.15);margin:12px auto 0;flex-shrink:0}
.sheet-scroll{overflow-y:auto;flex:1;padding:0 16px 32px}
.sheet-scroll::-webkit-scrollbar{display:none}

/* ── SEARCH SHEET ── */
#search-sheet{z-index:300}
.search-sheet-head{padding:16px 16px 12px;flex-shrink:0}
.back-row{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.back-btn{width:32px;height:32px;border-radius:9px;background:rgba(255,255,255,.06);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--dim);flex-shrink:0;transition:all .2s}
.back-btn:hover{color:var(--text);border-color:var(--border-light)}
.sheet-title{font-size:16px;font-weight:700}

.field-wrap{position:relative;margin-bottom:10px}
.field-wrap:last-of-type{margin-bottom:0}
.field-ico{position:absolute;left:13px;top:50%;transform:translateY(-50%);pointer-events:none;z-index:2}
.field-inp{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:13px;padding:13px 36px 13px 42px;color:var(--text);font-family:"Sora",sans-serif;font-size:14px;outline:none;transition:border-color .2s,background .2s}
.field-inp:focus{border-color:rgba(56,189,248,.4);background:rgba(56,189,248,.04)}
.field-inp::placeholder{color:var(--muted)}
.field-clear{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;padding:4px;display:none;font-size:15px;z-index:2}
.field-clear.show{display:block}
.swap-row{display:flex;justify-content:center;margin:6px 0}
.swap-btn{background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:8px;padding:5px 16px;cursor:pointer;color:var(--dim);font-size:11px;font-family:"Sora",sans-serif;font-weight:600;transition:all .2s}
.swap-btn:hover{color:var(--text);border-color:var(--border-light)}

/* suggestion box */
.sugg-box{position:absolute;top:calc(100% + 6px);left:0;right:0;z-index:400;background:#141414;border:1px solid var(--border);border-radius:14px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.75);display:none}
.sugg-item{display:flex;align-items:center;gap:12px;padding:12px 14px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.04);transition:background .15s}
.sugg-item:last-child{border-bottom:none}
.sugg-item:hover,.sugg-item:active{background:rgba(56,189,248,.08)}
.sugg-ico{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sugg-ico.stop{background:rgba(126,232,90,.1);border:1px solid rgba(126,232,90,.2)}
.sugg-ico.place{background:rgba(255,255,255,.05);border:1px solid var(--border)}
.sugg-main{font-size:13px;font-weight:600}
.sugg-sub{font-size:11px;color:var(--dim);margin-top:1px}

/* ── JOURNEY SHEET ── */
#journey-sheet .sheet-scroll{padding:16px 16px 32px}
.journey-head{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.route-badge{background:rgba(56,189,248,.12);border:1px solid rgba(56,189,248,.25);border-radius:9px;padding:5px 11px;font-size:13px;font-weight:800;color:var(--cyan);flex-shrink:0}
.journey-summary{flex:1;min-width:0}
.journey-route-line{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.journey-meta{font-size:11px;color:var(--dim);margin-top:2px}
.journey-dur{text-align:right;flex-shrink:0}
.dur-num{font-size:20px;font-weight:800;color:var(--cyan)}
.dur-lbl{font-size:10px;color:var(--dim)}

/* walk banners */
.walk-row{display:flex;gap:8px;margin-bottom:14px}
.walk-card{flex:1;padding:10px 12px;border-radius:12px;font-size:11px}
.walk-to{background:rgba(126,232,90,.08);border:1px solid rgba(126,232,90,.2)}
.walk-from{background:rgba(168,85,247,.08);border:1px solid rgba(168,85,247,.2)}
.walk-dist{font-weight:700;margin-bottom:2px}
.walk-stop{color:var(--dim);font-size:10px}

/* step list */
.steps{margin-bottom:16px}
.step{display:flex;gap:12px;margin-bottom:0}
.step-col{display:flex;flex-direction:column;align-items:center;width:16px;flex-shrink:0}
.step-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;margin-top:3px;border:2px solid}
.step-dot.w{border-color:var(--dim);background:transparent}
.step-dot.b{border-color:var(--green);background:var(--green)}
.step-dot.r{border-color:rgba(56,189,248,.4);background:transparent}
.step-dot.a{border-color:var(--orange);background:var(--orange)}
.step-dot.d{border-color:var(--cyan);background:var(--cyan)}
.step-line{flex:1;width:2px;min-height:24px;margin:2px 0}
.step-line.w{background:repeating-linear-gradient(to bottom,var(--muted) 0,var(--muted) 3px,transparent 3px,transparent 7px)}
.step-line.r{background:rgba(56,189,248,.35)}
.step-body{flex:1;padding-bottom:18px}
.step-title{font-size:13px;font-weight:600}
.step-sub{font-size:11px;color:var(--dim);margin-top:2px;line-height:1.5}
.step-tag{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px;margin-top:5px}
.step-tag.g{background:rgba(126,232,90,.1);color:var(--green);border:1px solid rgba(126,232,90,.2)}
.step-tag.p{background:rgba(168,85,247,.1);color:var(--purple);border:1px solid rgba(168,85,247,.2)}
.step-tag.o{background:rgba(249,115,22,.1);color:var(--orange);border:1px solid rgba(249,115,22,.2)}
.step-tag.c{background:rgba(56,189,248,.1);color:var(--cyan);border:1px solid rgba(56,189,248,.2)}

/* stop expander */
.stop-tog{font-size:11px;color:var(--dim);cursor:pointer;margin-top:4px;display:inline-flex;align-items:center;gap:4px;user-select:none}
.stop-tog:hover{color:var(--cyan)}
.stop-list{margin-top:6px;display:none;background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.stop-list.open{display:block}
.stop-li{padding:7px 12px;font-size:11px;color:var(--dim);border-bottom:1px solid rgba(255,255,255,.03);display:flex;align-items:center;gap:8px}
.stop-li:last-child{border-bottom:none}
.stop-num{font-size:9px;color:var(--muted);width:16px;text-align:right;flex-shrink:0}

/* live bus cards inside journey sheet */
.live-section-title{font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--dim);margin-bottom:10px}
.lbc{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:13px;padding:13px;margin-bottom:8px;cursor:pointer;transition:all .2s}
.lbc:hover{border-color:rgba(168,85,247,.35)}
.lbc-top{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:6px}
.lbc-name{font-size:14px;font-weight:700}
.lbc-status{font-size:10px;font-weight:700;padding:3px 9px;border-radius:999px}
.lbc-bot{display:flex;align-items:center;justify-content:space-between}
.lbc-detail{font-size:11px;color:var(--dim)}
.lbc-eta{text-align:right}
.eta-num{font-size:22px;font-weight:800}
.eta-lbl{font-size:10px;color:var(--dim)}

/* ── BUS DETAIL SHEET ── */
#bus-sheet .sheet-scroll{padding:16px 16px 32px}
.bus-sheet-head{display:flex;align-items:center;gap:12px;margin-bottom:18px}
.bus-icon-big{width:44px;height:44px;border-radius:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.bus-name-big{font-size:17px;font-weight:800}
.bus-route-big{font-size:12px;color:var(--dim);margin-top:2px}
.bus-stats{display:grid;grid-template-columns:1fr;gap:8px;margin-bottom:18px}
.stat-box{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:12px;padding:12px;text-align:center}
.stat-val{font-size:20px;font-weight:800;line-height:1}
.stat-lbl{font-size:10px;color:var(--dim);margin-top:4px}
.close-sheet-btn{margin-top:4px;width:100%;padding:12px;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:12px;color:var(--dim);font-family:"Sora",sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
.close-sheet-btn:hover{color:var(--text);border-color:var(--border-light)}

/* eta stop list in bus sheet */
.eta-stop-list{background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-top:14px}
.eta-stop-item{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid rgba(255,255,255,.04)}
.eta-stop-item:last-child{border-bottom:none}
.eta-stop-item.next-stop{background:rgba(56,189,248,.06)}
.eta-stop-name{font-size:12px;color:var(--dim)}
.eta-stop-name.next{color:var(--text);font-weight:600}
.eta-time{font-size:12px;font-weight:700;font-family:"Sora",sans-serif}

/* spinner */
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.1);border-top-color:var(--cyan);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── LOADING SCREEN ── */
#loading-screen{
  position:fixed;inset:0;z-index:9999;
  background:var(--bg);
  display:flex;align-items:center;justify-content:center;
  transition:opacity .5s ease, visibility .5s ease;
}
#loading-screen.hidden{opacity:0;visibility:hidden;pointer-events:none}
.loading-logo{width:240px;max-width:70vw;object-fit:contain;}

/* zoom controls */
.zoom-ctrl{position:fixed;right:16px;bottom:calc(env(safe-area-inset-bottom,0px) + 240px);z-index:150;display:flex;flex-direction:column;gap:6px}
.zoom-btn{width:38px;height:38px;background:var(--glass);border:1px solid var(--border);border-radius:11px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--dim);font-size:18px;transition:all .2s;backdrop-filter:blur(16px)}
.zoom-btn:hover{color:var(--text);border-color:var(--border-light)}

/* my location btn */
.myloc-btn{position:fixed;right:16px;bottom:calc(env(safe-area-inset-bottom,0px) + 196px);z-index:150;width:38px;height:38px;background:var(--glass);border:1px solid var(--border);border-radius:11px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--dim);backdrop-filter:blur(16px);transition:all .2s}
.myloc-btn:hover{color:var(--cyan);border-color:rgba(56,189,248,.3)}

/* user dot */
.user-dot{width:14px;height:14px;border-radius:50%;background:#3b82f6;border:2.5px solid #fff;box-shadow:0 0 0 4px rgba(59,130,246,.25)}

/* no results */
.no-res{text-align:center;padding:32px 16px;color:var(--dim);font-size:13px;line-height:1.7}

/* ── TOUCH SHEET DRAG ── */
.sheet{touch-action:pan-y}
.sheet-handle{cursor:grab;padding:6px 0;margin-bottom:4px}
.sheet-handle:active{cursor:grabbing}

/* ── SAFE AREAS ── */
.sheet-scroll{padding-bottom:max(32px, calc(env(safe-area-inset-bottom) + 20px)) !important}
.top-bar{padding-top:max(env(safe-area-inset-top,0px),14px)}
.zoom-ctrl,.myloc-btn{bottom:calc(env(safe-area-inset-bottom,0px) + 220px)}
.myloc-btn{bottom:calc(env(safe-area-inset-bottom,0px) + 175px)}

/* ── OVERSCROLL ── */
html,body{overscroll-behavior:none}
.sheet-scroll{overscroll-behavior:contain}

/* ── ACTIVE STATES for touch ── */
.lbc:active{background:rgba(168,85,247,.08);border-color:rgba(168,85,247,.35)}
.sugg-item:active{background:rgba(56,189,248,.1)}
.back-btn:active,.zoom-btn:active,.myloc-btn:active,.swap-btn:active{opacity:.6}
.search-pill:active{border-color:rgba(56,189,248,.35)}
</style>
</head>
<body>

<!-- LOADING SCREEN -->
<div id="loading-screen">
  <img class="loading-logo" src="logo1.png" alt="TransitLK">
</div>

<!-- LIVE MAP -->
<div id="main-map"></div>

<!-- TOP SEARCH BAR -->
<div class="top-bar">
  <div class="top-bar-inner">
    <img src="logo2.png" style="width:36px;height:36px;object-fit:contain;flex-shrink:0" alt="TransitLK">
    <div class="search-pill" onclick="openSearch()">
      <span class="search-pill-ico">
        <svg width="15" height="15" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8" stroke-width="2"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m21 21-4.35-4.35"/></svg>
      </span>
      <span class="search-pill-text" id="pill-text">Where are you going?</span>
      <span class="search-pill-dest" id="pill-dest" style="display:none"></span>
    </div>
  </div>
</div>

<!-- MAP CONTROLS -->
<div class="zoom-ctrl">
  <div class="zoom-btn" onclick="mainMap.zoomIn()">+</div>
  <div class="zoom-btn" onclick="mainMap.zoomOut()">−</div>
</div>
<div class="myloc-btn" onclick="goToMyLocation()" title="My location">
  <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
</div>

<!-- SEARCH SHEET -->
<div class="sheet" id="search-sheet">
  <div class="sheet-handle"></div>
  <div class="search-sheet-head">
    <div class="back-row">
      <div class="back-btn" onclick="closeSearch()">
        <svg width="15" height="15" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 12H5M12 5l-7 7 7 7"/></svg>
      </div>
      <div class="sheet-title">Plan your journey</div>
    </div>
    <div class="field-wrap">
      <span class="field-ico">
        <svg width="13" height="13" fill="none" stroke="var(--green)" stroke-width="2.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/></svg>
      </span>
      <input id="from-inp" class="field-inp" placeholder="Where from?" autocomplete="off"
        oninput="onInp('from')" onfocus="onFoc('from')" onblur="onBlr('from')">
      <button class="field-clear" id="from-clr" onclick="clrField('from')">✕</button>
      <div class="sugg-box" id="from-sugg"></div>
    </div>
    <div class="swap-row">
      <button class="swap-btn" onclick="doSwap()">⇅ Swap</button>
    </div>
    <div class="field-wrap">
      <span class="field-ico">
        <svg width="13" height="13" fill="none" stroke="var(--purple)" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M17.657 16.657L13.414 20.9a2 2 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><circle cx="12" cy="11" r="3" stroke-width="2"/></svg>
      </span>
      <input id="to-inp" class="field-inp" placeholder="Where to?" autocomplete="off"
        oninput="onInp('to')" onfocus="onFoc('to')" onblur="onBlr('to')">
      <button class="field-clear" id="to-clr" onclick="clrField('to')">✕</button>
      <div class="sugg-box" id="to-sugg"></div>
    </div>
  </div>
  <div class="sheet-scroll" id="search-results">
    <div style="text-align:center;padding:44px 20px;color:var(--dim);font-size:13px">
      Enter your start and destination above
    </div>
  </div>
</div>

<!-- JOURNEY SHEET -->
<div class="sheet" id="journey-sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-scroll" id="journey-content"></div>
</div>

<!-- BUS DETAIL SHEET -->
<div class="sheet" id="bus-sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-scroll" id="bus-content"></div>
</div>

function getUserLocation() {
  if (!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(pos => {
    userLocation = {lat:pos.coords.latitude, lng:pos.coords.longitude};
    const icon = L.divIcon({className:'',iconSize:[14,14],iconAnchor:[7,7],html:'<div class="user-dot"></div>'});
    if (userMarker) userMarker.setLatLng([userLocation.lat,userLocation.lng]);
    else userMarker = L.marker([userLocation.lat,userLocation.lng],{icon,zIndexOffset:500}).addTo(mainMap);
    mainMap.setView([userLocation.lat,userLocation.lng],14);
  }, null, {enableHighAccuracy:true,timeout:8000});
}

function goToMyLocation() {

function updateMapMarkers() {
  Object.entries(liveBuses).forEach(([id,bus]) => {
    if (!bus.lat || !bus.lng || !bus.online) return;
    const color = bus.inTrip ? '#a855f7' : '#eab308';
    const icon = makeBusIcon(color);
    if (busMarkers[id]) busMarkers[id].setLatLng([bus.lat,bus.lng]).setIcon(icon);
    else {
      busMarkers[id] = L.marker([bus.lat,bus.lng],{icon,zIndexOffset:100}).addTo(mainMap)
        .on('click', e => { e.originalEvent.stopPropagation(); openBusSheet(id); });
    }
  });
  Object.keys(busMarkers).forEach(id => {
    if (!liveBuses[id]?.online) { mainMap.removeLayer(busMarkers[id]); delete busMarkers[id]; }
  });
}

// ── Utilities ─────────────────────────────────────────────────────────
function hav(la1,ln1,la2,ln2){
  const R=6371000,dL=(la2-la1)*Math.PI/180,dN=(ln2-ln1)*Math.PI/180;
  const a=Math.sin(dL/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dN/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function fmtDist(m){return m>=1000?`${(m/1000).toFixed(1)} km`:`${Math.round(m)} m`;}
function fmtMins(m){return m>=60?`${Math.floor(m/60)}h ${m%60}m`:`${m} min`;}
function fuzzy(q,n){q=q.toLowerCase();n=n.toLowerCase();return n.includes(q)||q.split(' ').some(w=>w.length>1&&n.includes(w));}
function localStops(q){return q.length<2?[]:ALL_STOPS.filter(s=>fuzzy(q,s)).slice(0,4).map(n=>({name:n,isStop:true,...(OUT.find(s=>s.name===n)||RET.find(s=>s.name===n)||{})}));}

function durBetween(fi,ti,dir){
  const avg=dir==='OUT'?AVG.OUTBOUND:AVG.RETURN;
  let t=0;for(let i=fi;i<ti;i++)t+=avg[i+'→'+(i+1)]||2;
  return Math.round(t);
}

function detectDir(bus,admin){
  const sch=admin.schedule;
  if(sch?.ratmalana?.length||sch?.maharagama?.length){
    const now=new Date(),nm=now.getHours()*60+now.getMinutes();
    const all=[...(sch.ratmalana||[]).map(t=>({dir:'R2M',m:toMins(t)})),...(sch.maharagama||[]).map(t=>({dir:'M2R',m:toMins(t)}))].sort((a,b)=>a.m-b.m);
    let cur=null;for(const t of all){if(t.m<=nm)cur=t;}
    if(cur)return cur.dir;if(all.length)return all[0].dir;
  }
  return admin.stopsR2M?.length?'R2M':admin.stopsM2R?.length?'M2R':null;
}
function toMins(t){const[h,m]=t.split(':').map(Number);return h*60+m;}

function getNextStop(busId,bus){
  const admin=busAdminData[busId]||{};
  const dir=detectDir(bus,admin);
  if(!dir)return null;
  const stops=dir==='R2M'?(admin.stopsR2M||[]):(admin.stopsM2R||[]);
  if(!stops.length)return null;
  return stops.map((s,i)=>({...s,i,dist:hav(bus.lat,bus.lng,s.lat,s.lng)})).sort((a,b)=>a.dist-b.dist)[0];
}

function estimateETA(bus,targetStop){
  if(!bus.lat||!bus.lng)return null;
  const dist=hav(bus.lat,bus.lng,targetStop.lat,targetStop.lng);
  const spd=bus.speed>0.5?bus.speed:5;
  return Math.max(1,Math.round(dist/spd/60));
}

function decodePolyline(enc){
  let idx=0,lat=0,lng=0,pts=[];
  while(idx<enc.length){
    let b,shift=0,result=0;
    do{b=enc.charCodeAt(idx++)-63;result|=(b&0x1f)<<shift;shift+=5;}while(b>=0x20);
    lat+=(result&1)?~(result>>1):(result>>1);shift=0;result=0;
    do{b=enc.charCodeAt(idx++)-63;result|=(b&0x1f)<<shift;shift+=5;}while(b>=0x20);
    lng+=(result&1)?~(result>>1):(result>>1);
    pts.push([lat/1e5,lng/1e5]);
  }
  return pts;
}

async function fetchWalkPath(o,d){
  try{
    const url=`https://maps.googleapis.com/maps/api/directions/json?origin=${o.lat},${o.lng}&destination=${d.lat},${d.lng}&mode=walking&key=${GMAPS_KEY}`;
    const res=await fetch('https://corsproxy.io/?'+encodeURIComponent(url),{signal:AbortSignal.timeout(5000)});
    const data=await res.json();
    if(data.status==='OK'&&data.routes[0])return decodePolyline(data.routes[0].overview_polyline.points);
  }catch(e){}
  return null;
}

    if(pl.location){
      const r={name,lat:pl.location.lat(),lng:pl.location.lng()};
      if(field==='from')fromPlace=r;else toPlace=r;
      trySearch();
    }
  }catch(e){
    try{
      const{Geocoder}=await google.maps.importLibrary('geocoding');
      const gc=new Geocoder();
      const res=await gc.geocode({placeId});
      if(res.results[0]?.geometry){
        const r={name,lat:res.results[0].geometry.location.lat(),lng:res.results[0].geometry.location.lng()};
        if(field==='from')fromPlace=r;else toPlace=r;
        trySearch();
      }
    }catch(e2){
      document.getElementById('search-results').innerHTML='<div class="no-res">Could not get location.<br><span style="font-size:11px;color:var(--muted)">Try selecting a different result.</span></div>';
    }
  }
}

// ── Match & Search ────────────────────────────────────────────────────
function trySearch(){
  if(!fromPlace||!toPlace)return;
  updatePillDest(toPlace.name);
  doSearch();
}

function updatePillDest(name){
  document.getElementById('pill-text').textContent='To:';
  const d=document.getElementById('pill-dest');
  d.style.display='inline';
  d.textContent=name;
}

function doSearch(){
  const res=document.getElementById('search-results');
  res.innerHTML='<div style="text-align:center;padding:40px"><span class="spinner"></span></div>';
  const WALK=2000;
  const matches=[];
  for(const dir of ['OUT','RET']){
    const stops=dir==='OUT'?OUT:RET;
    if(!stops.length)continue;
    const fC=stops.map((s,i)=>({...s,i,dist:hav(fromPlace.lat,fromPlace.lng,s.lat,s.lng)})).filter(s=>s.dist<=WALK).sort((a,b)=>a.dist-b.dist);
    const tC=stops.map((s,i)=>({...s,i,dist:hav(toPlace.lat,toPlace.lng,s.lat,s.lng)})).filter(s=>s.dist<=WALK).sort((a,b)=>a.dist-b.dist);
    if(!fC.length||!tC.length)continue;
    const board=fC[0],alight=tC[0];
    if(board.i>=alight.i)continue;
    const rideStops=stops.slice(board.i,alight.i+1);
    const mins=durBetween(board.i,alight.i,dir);
    const dLabel=dir==='OUT'?RD.label_outbound:RD.label_return;
    matches.push({dir,dLabel,board,alight,rideStops,stops,walkToBoard:Math.round(board.dist),walkFromAlight:Math.round(alight.dist),mins});
  }
  // Also check Firebase admin stops
  for(const[busId,admin]of Object.entries(busAdminData)){
    for(const dir of['R2M','M2R']){
      const stops=dir==='R2M'?(admin.stopsR2M||[]):(admin.stopsM2R||[]);
      if(!stops.length)continue;
      const fC=stops.map((s,i)=>({...s,i,dist:hav(fromPlace.lat,fromPlace.lng,s.lat,s.lng)})).filter(s=>s.dist<=WALK).sort((a,b)=>a.dist-b.dist);
      const tC=stops.map((s,i)=>({...s,i,dist:hav(toPlace.lat,toPlace.lng,s.lat,s.lng)})).filter(s=>s.dist<=WALK).sort((a,b)=>a.dist-b.dist);
      if(!fC.length||!tC.length)continue;
      const board=fC[0],alight=tC[0];
      if(board.i>=alight.i||matches.find(m=>m.busId===busId&&m.adminDir===dir))continue;
      const rideStops=stops.slice(board.i,alight.i+1);
      matches.push({busId,adminDir:dir,dLabel:dir==='R2M'?'Outbound':'Return',board,alight,rideStops,stops,walkToBoard:Math.round(board.dist),walkFromAlight:Math.round(alight.dist),mins:Math.round((alight.i-board.i)*3)});
    }
  }
  if(!matches.length){
    res.innerHTML=`<div class="no-res"><svg width="36" height="36" fill="none" stroke="rgba(255,255,255,.2)" stroke-width="1.5" viewBox="0 0 24 24" style="margin:0 auto 12px;display:block"><circle cx="11" cy="11" r="8"/><path stroke-linecap="round" d="m21 21-4.35-4.35"/></svg>No route found within 2km.<br><span style="font-size:11px;color:var(--muted)">Try locations closer to the route.</span></div>`;
    return;
  }
  matches.sort((a,b)=>(a.walkToBoard+a.walkFromAlight)-(b.walkToBoard+b.walkFromAlight));
  currentMatch=matches[0];
  renderSearchResult(currentMatch);
  drawJourneyOnMap(currentMatch);
}

// ── Search result in sheet ────────────────────────────────────────────
function renderSearchResult(m){
  const res=document.getElementById('search-results');
  const rideCount=m.alight.i-m.board.i;
  const buses=Object.entries(liveBuses).filter(([,b])=>b.online);
  const walkH=(m.walkToBoard>50||m.walkFromAlight>50)?`<div class="walk-row">
    ${m.walkToBoard>50?`<div class="walk-card walk-to"><div class="walk-dist" style="color:var(--green)">${fmtDist(m.walkToBoard)}</div><div class="walk-stop">to board at ${m.board.name}</div></div>`:''}
    ${m.walkFromAlight>50?`<div class="walk-card walk-from"><div class="walk-dist" style="color:var(--purple)">${fmtDist(m.walkFromAlight)}</div><div class="walk-stop">after alighting at ${m.alight.name}</div></div>`:''}
  </div>`:'';
  const mids=m.rideStops.slice(1,-1);
  const midH=mids.map((s,i)=>`<div class="stop-li"><span class="stop-num">${m.board.i+i+1}</span>${s.name}</div>`).join('');
  const busCardsH=buses.length?buses.map(([id,bus])=>{
    const admin=busAdminData[id]||{};
    const name=admin.plate||bus.customName||id;
    const inT=bus.inTrip===true;
    const col=inT?'#a855f7':'#6b7280';
    const spd=((bus.speed||0)*3.6).toFixed(0);
    let etaH='';
    if(inT){
      // ML ETA from Firebase
      const mlEtas=bus.etas?.stops;
      if(mlEtas?.length){
        const boardEta=mlEtas.find(s=>s.stopName===m.board.name||s.stopIdx===m.board.i);
        if(boardEta){
          const ec=boardEta.etaMins<=5?'#7ee85a':boardEta.etaMins<=15?'#eab308':'#38bdf8';
          etaH=`<div class="lbc-eta"><span class="eta-num" style="color:${ec}">${Math.round(boardEta.etaMins)}</span><div class="eta-lbl">min to your stop</div><div style="font-size:9px;color:rgba(126,232,90,.6);margin-top:1px">ML MODEL</div></div>`;
        }
      }
      if(!etaH){
        const eta=estimateETA(bus,m.board);
        if(eta!==null){const ec=eta<=5?'#7ee85a':eta<=15?'#eab308':'#38bdf8';etaH=`<div class="lbc-eta"><span class="eta-num" style="color:${ec}">${eta}</span><div class="eta-lbl">min (est.)</div></div>`;}
      }
    }
    return `<div class="lbc" onclick="openBusSheet('${id}')">
      <div class="lbc-top"><div class="lbc-name">${name}</div><span class="lbc-status" style="background:${inT?'rgba(168,85,247,.12)':'rgba(107,114,128,.12)'};border:1px solid ${inT?'rgba(168,85,247,.3)':'rgba(107,114,128,.3)'};color:${col}">${inT?'● In Trip':'● Offline'}</span></div>
      <div class="lbc-bot"><div class="lbc-detail">Route 256-341</div>${etaH}</div>
    </div>`;
  }).join(''):`<div class="no-res" style="padding:20px 0">No buses currently online</div>`;

  res.innerHTML=`
    ${walkH}
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
      <div class="route-badge">256-341</div>
      <div>
        <div style="font-size:13px;font-weight:600">${m.board.name} → ${m.alight.name}</div>
        <div style="font-size:11px;color:var(--dim);margin-top:2px">${rideCount} stop${rideCount!==1?'s':''} · ~${fmtMins(m.mins)} · ${m.dLabel}</div>
      </div>
    </div>

    <div class="steps">
      <div class="step">
        <div class="step-col"><div class="step-dot w"></div><div class="step-line w"></div></div>
        <div class="step-body">
          <div class="step-title">Walk to boarding stop</div>
          <div class="step-sub">${m.board.name}</div>
          ${m.walkToBoard>50?`<span class="step-tag g">${fmtDist(m.walkToBoard)} walk</span>`:`<span class="step-tag g">Stop #${m.board.i+1}</span>`}
        </div>
      </div>
      <div class="step">
        <div class="step-col"><div class="step-dot b"></div><div class="step-line r"></div></div>
        <div class="step-body">
          <div class="step-title">Board the bus</div>
          <div class="step-sub">${m.board.name} · Route 256-341 · ${m.dLabel}</div>
          <span class="step-tag c">Look for the bus heading ${m.dLabel}</span>
        </div>
      </div>
      <div class="step">
        <div class="step-col"><div class="step-dot r"></div><div class="step-line r"></div></div>
        <div class="step-body">
          <div class="step-title">Ride ~${fmtMins(m.mins)}</div>
          <div class="step-sub">${rideCount} stop${rideCount!==1?'s':''} in the ${m.dLabel} direction</div>
          ${mids.length?`<div class="stop-tog" onclick="this.nextElementSibling.classList.toggle('open')">
            <svg width="11" height="11" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
            ${mids.length} intermediate stop${mids.length!==1?'s':''}
          </div>
          <div class="stop-list">${midH}</div>`:''}
        </div>
      </div>
      <div class="step">
        <div class="step-col"><div class="step-dot a"></div><div class="step-line w"></div></div>
        <div class="step-body">
          <div class="step-title">Get off the bus</div>
          <div class="step-sub">${m.alight.name} · Stop #${m.alight.i+1}</div>
          <span class="step-tag o">Watch for this stop!</span>
        </div>
      </div>
      <div class="step">
        <div class="step-col"><div class="step-dot d"></div></div>
        <div class="step-body">
          <div class="step-title">You've arrived</div>
          <div class="step-sub">${toPlace?.name||m.alight.name}</div>
        </div>
      </div>
    </div>

    <div class="live-section-title">Live buses on this route</div>
    ${busCardsH}`;
}

// ── Journey on map ────────────────────────────────────────────────────
function clearJourneyLayers(){
  journeyLayers.forEach(l=>mainMap.removeLayer(l));
  journeyLayers=[];
}

function drawJourneyOnMap(m){
  clearJourneyLayers();
  const stops=m.stops;

  // Dim full route
  const rl=L.polyline(stops.map(s=>[s.lat,s.lng]),{color:'rgba(56,189,248,.12)',weight:3,dashArray:'6 6'}).addTo(mainMap);
  journeyLayers.push(rl);

  // Ride segment bright
  const ride=L.polyline(m.rideStops.map(s=>[s.lat,s.lng]),{color:'rgba(56,189,248,.65)',weight:4}).addTo(mainMap);
  journeyLayers.push(ride);

  // Walk lines
  if(fromPlace&&m.walkToBoard>50){
    const wl=L.polyline([[fromPlace.lat,fromPlace.lng],[m.board.lat,m.board.lng]],{color:'#7ee85a',weight:2.5,dashArray:'5 7',opacity:.75}).addTo(mainMap);
    journeyLayers.push(wl);
    fetchWalkPath({lat:fromPlace.lat,lng:fromPlace.lng},{lat:m.board.lat,lng:m.board.lng}).then(p=>{
      if(p){mainMap.removeLayer(wl);const wl2=L.polyline(p,{color:'#7ee85a',weight:3,dashArray:'5 7',opacity:.85}).addTo(mainMap);journeyLayers.push(wl2);}
    });
  }
  if(toPlace&&m.walkFromAlight>50){
    const wl=L.polyline([[m.alight.lat,m.alight.lng],[toPlace.lat,toPlace.lng]],{color:'#a855f7',weight:2.5,dashArray:'5 7',opacity:.75}).addTo(mainMap);
    journeyLayers.push(wl);
    fetchWalkPath({lat:m.alight.lat,lng:m.alight.lng},{lat:toPlace.lat,lng:toPlace.lng}).then(p=>{
      if(p){mainMap.removeLayer(wl);const wl2=L.polyline(p,{color:'#a855f7',weight:3,dashArray:'5 7',opacity:.85}).addTo(mainMap);journeyLayers.push(wl2);}
    });
  }

  // Stop markers
  stops.forEach((stop,i)=>{
    const isBoard=stop.name===m.board.name;
    const isAlight=stop.name===m.alight.name;
    const inRide=i>=m.board.i&&i<=m.alight.i;
    const color=isBoard?'#7ee85a':isAlight?'#a855f7':'#38bdf8';
    const size=isBoard||isAlight?30:16;
    const opacity=inRide?1:0.25;
    const icon=L.divIcon({className:'',iconSize:[size,size],iconAnchor:[size/2,size/2],
      html:`<div style="width:${size}px;height:${size}px;background:rgba(8,8,8,.9);border:${isBoard||isAlight?'2.5':'1.5'}px solid ${color};border-radius:50%;display:flex;align-items:center;justify-content:center;opacity:${opacity};box-shadow:0 0 ${isBoard||isAlight?14:4}px ${color}${isBoard||isAlight?'88':'44'}">
        <svg width="${size*0.55}" height="${size*0.55}" viewBox="0 0 24 24" fill="${color}"><path d="M4 16c0 .88.39 1.67 1 2.22V20a1 1 0 001 1h1a1 1 0 001-1v-1h8v1a1 1 0 001 1h1a1 1 0 001-1v-1.78c.61-.55 1-1.34 1-2.22V6c0-3.5-3.58-4-8-4s-8 .5-8 4v10zm3.5 1c-.83 0-1.5-.67-1.5-1.5S6.67 14 7.5 14s1.5.67 1.5 1.5S8.33 17 7.5 17zm9 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zm1.5-6H6V6h12v5z"/></svg>
      </div>`});
    const label=isBoard?'🚌 Board here':isAlight?'Get off here':stop.name;
    const mk=L.marker([stop.lat,stop.lng],{icon}).addTo(mainMap)
      .bindTooltip(`<div style="font-size:11px;font-weight:600;color:${color};background:rgba(8,8,8,.95);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:5px 9px;white-space:nowrap">${label}</div>`,{permanent:isBoard||isAlight,direction:'top',className:'',offset:[0,-4]});
    journeyLayers.push(mk);
  });

  // Origin/dest
  if(fromPlace){
    const m1=L.marker([fromPlace.lat,fromPlace.lng],{icon:L.divIcon({className:'',iconSize:[14,14],iconAnchor:[7,7],html:'<div style="width:14px;height:14px;border-radius:50%;background:#7ee85a;border:2.5px solid #fff;box-shadow:0 0 0 4px rgba(126,232,90,.25)"></div>'}),zIndexOffset:200}).addTo(mainMap).bindTooltip(`📍 ${fromPlace.name}`,{direction:'top',className:''});
    journeyLayers.push(m1);
  }
  if(toPlace){
    const m2=L.marker([toPlace.lat,toPlace.lng],{icon:L.divIcon({className:'',iconSize:[14,14],iconAnchor:[7,7],html:'<div style="width:14px;height:14px;border-radius:50%;background:#a855f7;border:2.5px solid #fff;box-shadow:0 0 0 4px rgba(168,85,247,.25)"></div>'}),zIndexOffset:200}).addTo(mainMap).bindTooltip(`🏁 ${toPlace.name}`,{direction:'top',className:''});
    journeyLayers.push(m2);
  }

  // Fit bounds to full journey including walk legs
  const allPts=[
    ...(fromPlace?[[fromPlace.lat,fromPlace.lng]]:[]),
    ...(toPlace?[[toPlace.lat,toPlace.lng]]:[]),
    ...stops.map(s=>[s.lat,s.lng])
  ];
  mainMap.fitBounds(allPts,{padding:[80,80],maxZoom:15,animate:true});

  // Open journey sheet
  document.getElementById('journey-content').innerHTML='';
  renderJourneySheet(m);
  document.getElementById('search-sheet').classList.remove('open');
  document.getElementById('journey-sheet').classList.add('open');
  history.pushState({sheet:'journey'},'',location.href);
}

function renderJourneySheet(m){
  renderSearchResult(m); // reuse search result HTML inside journey sheet
  document.getElementById('journey-content').innerHTML=document.getElementById('search-results').innerHTML;
}

// ── Bus detail sheet ──────────────────────────────────────────────────
function refreshBusSheet(busId){
  const bus=liveBuses[busId]||{};
  const admin=busAdminData[busId]||{};
  const name=admin.plate||bus.customName||busId;
  const inT=bus.inTrip===true;
  const color=inT?'#a855f7':'#eab308';
  const spd=((bus.speed||0)*3.6).toFixed(0);

  const next=getNextStop(busId,bus);
  const dir=detectDir(bus,admin);
  const stops=dir==='R2M'?(admin.stopsR2M||[]):(admin.stopsM2R||[]);

  // ML ETAs from Firebase
  const mlStops=bus.etas?.stops||[];

  let etaListH='';
  if(inT&&stops.length){
    const withDist=stops.map((s,i)=>({...s,i,dist:hav(bus.lat||0,bus.lng||0,s.lat,s.lng)})).sort((a,b)=>a.dist-b.dist);
    const nextIdx=withDist[0]?.i||0;
    const upcoming=stops.slice(nextIdx,nextIdx+8);
    etaListH=`<div style="font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--dim);margin-bottom:8px">${mlStops.length?'ML ETAs':'Upcoming stops'}</div>
    <div class="eta-stop-list">
      ${upcoming.map((s,i)=>{
        const isNext=i===0;
        const ml=mlStops.find(e=>e.stopName===s.name||e.stopIdx===s.i);
        const eta=ml?`${Math.round(ml.etaMins)} min`:estimateETA(bus,s)!==null?`~${estimateETA(bus,s)} min`:'';
        const etaColor=ml?(ml.etaMins<=5?'var(--green)':ml.etaMins<=15?'var(--yellow)':'var(--cyan)'):'var(--cyan)';
        return `<div class="eta-stop-item${isNext?' next-stop':''}">
          <div class="eta-stop-name${isNext?' next':''}">${isNext?'▸ ':''}${s.name}</div>
          <div class="eta-time" style="color:${etaColor}">${eta}</div>
        </div>`;
      }).join('')}
    </div>
    ${mlStops.length?'<div style="font-size:9px;color:rgba(126,232,90,.5);text-align:right;margin-top:5px">Powered by ML model</div>':''}`;
  }

  document.getElementById('bus-content').innerHTML=`
    <div class="bus-sheet-head">
      <div class="bus-icon-big" style="background:${inT?'rgba(168,85,247,.12)':'rgba(234,179,8,.12)'};border:1px solid ${inT?'rgba(168,85,247,.3)':'rgba(234,179,8,.3)'}">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="${color}"><path d="M4 16c0 .88.39 1.67 1 2.22V20a1 1 0 001 1h1a1 1 0 001-1v-1h8v1a1 1 0 001 1h1a1 1 0 001-1v-1.78c.61-.55 1-1.34 1-2.22V6c0-3.5-3.58-4-8-4s-8 .5-8 4v10zm3.5 1c-.83 0-1.5-.67-1.5-1.5S6.67 14 7.5 14s1.5.67 1.5 1.5S8.33 17 7.5 17zm9 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zm1.5-6H6V6h12v5z"/></svg>
      </div>
      <div>
        <div class="bus-name-big">${name}</div>
        <div class="bus-route-big">Route ${admin.routeNo||'256-341'} · <span style="color:${color}">${inT?'In Trip':'Online'}</span></div>
      </div>
    </div>
    <div class="bus-stats" style="grid-template-columns:1fr">
      <div class="stat-box">
        <div class="stat-val" style="color:${color};font-size:14px">${next?next.name:'--'}</div>
        <div class="stat-lbl">next stop</div>
      </div>
    </div>
    ${etaListH}
    <button class="close-sheet-btn" onclick="closeBusSheet()">Close</button>`;

// ── HISTORY / BACK BUTTON ─────────────────────────────────────────────
history.replaceState({sheet:null},'',location.href);

const _SHEETS = ['search-sheet','journey-sheet','bus-sheet'];
function _getOpen(){ return _SHEETS.find(id=>document.getElementById(id)?.classList.contains('open'))||null; }

window.addEventListener('popstate', function(){
  var open = _getOpen();
  if(open){
    document.getElementById(open).classList.remove('open');
    if(open==='bus-sheet') activeBusSheetId=null;
  }
});

// ── SWIPE DOWN TO DISMISS SHEETS ──────────────────────────────────────
(function(){
  var sY=0, sX=0, drag=false, sel=null, lY=0, lT=0, vel=0;
  var THR=90, VEL=0.4;
  _SHEETS.forEach(function(id){
    var el=document.getElementById(id);
    if(!el) return;
    el.addEventListener('touchstart', function(e){
      var fromH=e.target.closest('.sheet-handle');
      var scr=el.querySelector('.sheet-scroll');
      if(!fromH && scr && scr.scrollTop>4) return;
      sY=e.touches[0].clientY; sX=e.touches[0].clientX;
      lY=sY; lT=Date.now(); vel=0; drag=true; sel=el;
      el.style.transition='none';
    },{passive:true});
    el.addEventListener('touchmove', function(e){
      if(!drag||sel!==el) return;
      var dy=e.touches[0].clientY-sY;
      var dx=Math.abs(e.touches[0].clientX-sX);
      if(dx>Math.abs(dy)&&Math.abs(dy)<10){drag=false;el.style.transition='';return;}
      if(dy<=0) return;
      var now=Date.now(); vel=(e.touches[0].clientY-lY)/(now-lT||1); lY=e.touches[0].clientY; lT=now;
      el.style.transform='translateY('+dy+'px)';
      e.preventDefault();
    },{passive:false});
    el.addEventListener('touchend', function(e){
      if(!drag||sel!==el){drag=false;return;}
      var dy=e.changedTouches[0].clientY-sY;
      el.style.transition=''; el.style.transform='';
      if(dy>THR||vel>VEL){
        el.classList.remove('open');
        if(id==='bus-sheet') activeBusSheetId=null;
        if(history.state&&history.state.sheet) history.back();
      }
      drag=false; sel=null;
    },{passive:true});
  });
})();

// ── PREVENT MAP TOUCH BLEED ───────────────────────────────────────────
document.querySelectorAll('.sheet').forEach(function(el){
  el.addEventListener('touchstart',function(e){e.stopPropagation();},{passive:true});
});

}</script>
